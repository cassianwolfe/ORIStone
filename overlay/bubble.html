<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    color: #f0f0f0;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Bubble button ── */
  #bubble {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid rgba(99, 179, 237, 0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 12px rgba(99,179,237,0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    z-index: 100;
  }

  #bubble:hover {
    transform: scale(1.08);
    border-color: rgba(99, 179, 237, 0.9);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 20px rgba(99,179,237,0.35);
  }

  #bubble.active {
    border-color: rgba(129, 230, 217, 0.8);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 20px rgba(129,230,217,0.3);
  }

  #bubble svg {
    width: 26px;
    height: 26px;
    opacity: 0.9;
  }

  /* ── Game state indicator dot ── */
  #status-dot {
    position: fixed;
    bottom: 14px;
    right: 14px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #718096;
    border: 1.5px solid rgba(0,0,0,0.4);
    transition: background 0.3s ease;
    z-index: 101;
  }

  #status-dot.active  { background: #68d391; }
  #status-dot.waiting { background: #f6ad55; }

  /* ── Panel ── */
  #panel {
    position: fixed;
    bottom: 76px;
    right: 16px;
    width: 310px;
    max-height: 420px;
    background: rgba(13, 16, 26, 0.94);
    border: 1px solid rgba(99, 179, 237, 0.25);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 99;
  }

  #panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #header h1 {
    font-size: 13px;
    font-weight: 600;
    color: #90cdf4;
    letter-spacing: 0.03em;
  }

  #game-pill {
    font-size: 10px;
    font-weight: 500;
    color: #718096;
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
    padding: 2px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
    transition: color 0.3s ease;
  }

  #game-pill.in-game { color: #68d391; }

  #close-btn {
    background: none;
    border: none;
    color: #4a5568;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.1s ease;
  }
  #close-btn:hover { color: #a0aec0; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 0.15s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.45;
    padding: 0 2px;
  }

  .msg-bubble {
    padding: 8px 11px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 12.5px;
  }

  .msg.user .msg-bubble {
    background: rgba(99, 179, 237, 0.12);
    border: 1px solid rgba(99, 179, 237, 0.18);
    color: #bee3f8;
    border-bottom-right-radius: 3px;
    align-self: flex-end;
    max-width: 92%;
  }

  .msg.user .msg-label { text-align: right; color: #90cdf4; }

  .msg.ori .msg-bubble {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: #e2e8f0;
    border-bottom-left-radius: 3px;
    max-width: 96%;
  }

  .msg.ori .msg-label { color: #81e6d9; }

  .msg.error .msg-bubble {
    background: rgba(245, 101, 101, 0.1);
    border: 1px solid rgba(245, 101, 101, 0.2);
    color: #fc8181;
  }

  /* Cursor blink during stream */
  .cursor::after {
    content: "▋";
    animation: blink 0.7s step-end infinite;
    opacity: 0.7;
    font-size: 11px;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 0; }
  }

  /* ── Empty state ── */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #4a5568;
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }

  #empty svg { opacity: 0.3; }

  /* ── Input area ── */
  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding: 8px 10px 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 7px 10px;
    color: #f0f0f0;
    font-size: 12.5px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.4;
    max-height: 80px;
    transition: border-color 0.15s ease;
  }

  #input::placeholder { color: #4a5568; }
  #input:focus { border-color: rgba(99, 179, 237, 0.4); }

  #send-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2b6cb0, #2c5282);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  #send-btn:hover  { opacity: 0.85; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.35; cursor: default; }

  #send-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<!-- Status dot -->
<div id="status-dot"></div>

<!-- Bubble toggle -->
<div id="bubble" title="Ask ORI">
  <svg viewBox="0 0 24 24" fill="none" stroke="rgba(99,179,237,0.9)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 8v4M12 16h.01"/>
  </svg>
</div>

<!-- Chat panel -->
<div id="panel">
  <div id="header">
    <div id="header-left">
      <h1>ORI</h1>
      <div id="game-pill">no game</div>
    </div>
    <button id="close-btn" title="Close">✕</button>
  </div>

  <div id="messages">
    <div id="empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Ask ORI anything about<br>your current game</span>
    </div>
  </div>

  <div id="input-row">
    <textarea id="input" placeholder="should I trade here?" rows="1"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const bubble    = document.getElementById("bubble");
  const panel     = document.getElementById("panel");
  const messages  = document.getElementById("messages");
  const inputEl   = document.getElementById("input");
  const sendBtn   = document.getElementById("send-btn");
  const closBtn   = document.getElementById("close-btn");
  const emptyEl   = document.getElementById("empty");
  const gamePill  = document.getElementById("game-pill");
  const statusDot = document.getElementById("status-dot");

  let isOpen      = false;
  let isStreaming = false;
  let streamTarget = null;

  // ── Interactivity toggle ─────────────────────────────────────────────────

  function setInteractive(v) {
    ori.setInteractive(v);
  }

  bubble.addEventListener("mouseenter", () => setInteractive(true));
  bubble.addEventListener("mouseleave", () => { if (!isOpen) setInteractive(false); });
  panel.addEventListener("mouseenter",  () => setInteractive(true));
  panel.addEventListener("mouseleave",  () => setInteractive(false));

  // ── Panel open/close ─────────────────────────────────────────────────────

  function openPanel() {
    isOpen = true;
    panel.classList.add("open");
    bubble.classList.add("active");
    setInteractive(true);
    inputEl.focus();
    ori.getGameState();
  }

  function closePanel() {
    isOpen = false;
    panel.classList.remove("open");
    bubble.classList.remove("active");
    setInteractive(false);
  }

  bubble.addEventListener("click", () => isOpen ? closePanel() : openPanel());
  closBtn.addEventListener("click", closePanel);

  // ── Messages ─────────────────────────────────────────────────────────────

  function hideEmpty() {
    emptyEl.style.display = "none";
  }

  function addMessage(role, text) {
    hideEmpty();
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "You" : role === "ori" ? "ORI" : "Error";

    const bub = document.createElement("div");
    bub.className = "msg-bubble";
    bub.textContent = text;

    msg.appendChild(label);
    msg.appendChild(bub);
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
    return bub;
  }

  function startOriMessage() {
    hideEmpty();
    const msg = document.createElement("div");
    msg.className = "msg ori";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "ORI";

    const bub = document.createElement("div");
    bub.className = "msg-bubble cursor";
    bub.textContent = "";

    msg.appendChild(label);
    msg.appendChild(bub);
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
    return bub;
  }

  // ── Send ─────────────────────────────────────────────────────────────────

  function send() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    addMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";

    isStreaming  = true;
    sendBtn.disabled = true;
    streamTarget = startOriMessage();

    ori.send(text);
  }

  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + "px";
  });

  // ── ORI events ───────────────────────────────────────────────────────────

  ori.onToken((token) => {
    if (!streamTarget) return;
    streamTarget.textContent += token;
    messages.scrollTop = messages.scrollHeight;
  });

  ori.onDone(() => {
    if (streamTarget) streamTarget.classList.remove("cursor");
    streamTarget  = null;
    isStreaming   = false;
    sendBtn.disabled = false;
    inputEl.focus();
  });

  ori.onError((err) => {
    if (streamTarget) {
      streamTarget.classList.remove("cursor");
      streamTarget.textContent = err;
      streamTarget.closest(".msg").className = "msg error";
    } else {
      addMessage("error", err);
    }
    streamTarget  = null;
    isStreaming   = false;
    sendBtn.disabled = false;
  });

  // ── Game state ───────────────────────────────────────────────────────────

  ori.onGameState((state) => {
    const inGame = !state.includes("No active");
    statusDot.className = inGame ? "active" : "";
    if (inGame) {
      const turnMatch = state.match(/Turn (\d+)/);
      const hpMatch   = state.match(/Friendly: (\d+) HP/);
      const oppMatch  = state.match(/Opposing: (\d+) HP/);
      let pill = turnMatch ? `T${turnMatch[1]}` : "in game";
      if (hpMatch && oppMatch) pill += ` · ${hpMatch[1]}v${oppMatch[1]}`;
      gamePill.textContent = pill;
      gamePill.className = "in-game";
    } else {
      gamePill.textContent = "no game";
      gamePill.className = "";
    }
  });

  // Poll game state every 3s when panel is open
  setInterval(() => { if (isOpen) ori.getGameState(); }, 3000);
  ori.getGameState();
</script>
</body>
</html>
